# vim: set ft=yaml fenc=utf-8 ff=unix sw=2 ts=2 et :
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install vcpkg dependencies
        run: vcpkg install opus:x64-windows-static libogg:x64-windows-static libebur128:x64-windows-static

      - name: Build
        run: pwsh -ExecutionPolicy Bypass -File build.ps1

      - name: Package
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          Compress-Archive -Path out/minply.exe, minply.toml -DestinationPath "minply-$version-x64.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: minply-*-x64.zip
