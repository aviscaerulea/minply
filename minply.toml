# vim: set ft=toml fenc=utf-8 ff=unix sw=4 ts=4 et :
##################################################
# minply 設定ファイル
##################################################

# ガードトーン設定
[guard]
# ガードトーンの有効／無効
# BLE レシーバの省電力モード抑止のため、本編の前後に不可聴の高周波トーンを再生する
# デフォルト: true
# enabled = true

# リードイン秒数
# BLE ウェイクアップ（約 700ms）＋ WASAPI セッション起動ノイズのマージン
# デフォルト: 1.2
# lead_in_duration = 1.2

# リードアウト秒数
# SBC コーデックパイプラインの末尾バッファが抜けるまで BLE をアクティブに保つ
# デフォルト: 1.2
# lead_out_duration = 1.2

# ラウドネスノーマライズ設定
[loudness]
# ラウドネスノーマライズの有効／無効
# EBU R128（ITU-R BS.1770-4）に基づき、ソースごとの音量差を統一する
# デフォルト: true
# enabled = true

# 目標ラウドネス（LUFS）
# 通知音に最適化した -16.0 LUFS を使用する
# デフォルト: -16.0
# target = -16.0

# トゥルーピーク上限（-1dBFS = 0.891）
# ラウドネスゲイン後のクリッピングを防止する
# デフォルト: 0.891
# peak_ceiling = 0.891
