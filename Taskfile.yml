version: '3'

tasks:
  setup:
    desc: vcpkg で依存ライブラリをインストール
    status:
      - vcpkg list | grep -q "opus:x64-windows-static"
    cmds:
      - vcpkg install opus:x64-windows-static libogg:x64-windows-static

  build:
    desc: minply をビルド
    deps: [setup]
    cmds:
      - pwsh -ExecutionPolicy Bypass -File build.ps1

  clean:
    desc: ビルド成果物を削除
    cmds:
      - pwsh -Command "Remove-Item -Recurse -Force out -ErrorAction SilentlyContinue"

  run:
    desc: test.mp3 を再生
    deps: [build]
    cmds:
      - ./out/minply.exe test.mp3

  default:
    desc: デフォルトタスク（ビルド）
    cmds:
      - task build
